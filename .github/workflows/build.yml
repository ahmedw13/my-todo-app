name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4
      
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'
          
      - name: Install Flet and Dependencies
        run: |
          pip install "flet[all]"
          
      - name: Build APK
        run: |
          flet build apk --yes
          
      - name: Upload APK
        uses: actions/upload-artifact@v4 # Fixed: This was causing your error
        with:
          name: todo-app-apk
          path: build/apk/*.apk
